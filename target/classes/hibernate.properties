# Configuração do Hibernate para PostgreSQL

# Dialeto do banco de dados
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# URL de conexão (ajuste conforme sua configuração)
hibernate.connection.url=jdbc:postgresql://localhost:5432/locacao_veiculos

# Usuário e senha do banco de dados (ajuste conforme sua configuração)
hibernate.connection.username=postgres
hibernate.connection.password=adminadmin

# Driver JDBC
hibernate.connection.driver_class=org.postgresql.Driver

# Estratégia de criação/atualização do schema
# create: cria o schema toda vez (apaga dados existentes)
# update: atualiza o schema sem apagar dados
# validate: valida o schema
# create-drop: cria e depois apaga ao final
hibernate.hbm2ddl.auto=update

# Mostrar SQL no console
hibernate.show_sql=true

# Formatar SQL
hibernate.format_sql=true

# Pool de conexões
hibernate.connection.pool_size=10

# Configurações adicionais
hibernate.current_session_context_class=thread
hibernate.enable_lazy_load_no_trans=true
